version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/liveliness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      FLOWFORGE_DATABASE_URL: postgresql+asyncpg://flowforge:flowforge@postgres:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379
      FLOWFORGE_LITELLM_URL: http://litellm:4000
      FLOWFORGE_LITELLM_MASTER_KEY: sk-flowforge-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: python -m flowforge.worker
    environment:
      FLOWFORGE_DATABASE_URL: postgresql+asyncpg://flowforge:flowforge@postgres:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379
      FLOWFORGE_LITELLM_URL: http://litellm:4000
      FLOWFORGE_LITELLM_MASTER_KEY: sk-flowforge-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
