apiVersion: v1
kind: Service
metadata:
  name: flowforge-frontend
  namespace: flowforge
spec:
  selector:
    app: flowforge-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-frontend
  namespace: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-frontend
  template:
    metadata:
      labels:
        app: flowforge-frontend
    spec:
      containers:
        - name: frontend
          image: flowforge/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
