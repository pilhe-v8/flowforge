# Build: docker build -t flowforge/backend:latest ./backend && docker push flowforge/backend:latest
apiVersion: v1
kind: Service
metadata:
  name: flowforge-backend
  namespace: flowforge
spec:
  selector:
    app: flowforge-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-backend
  namespace: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-backend
  template:
    metadata:
      labels:
        app: flowforge-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: flowforge/backend:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: flowforge-config
            - secretRef:
                name: flowforge-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
