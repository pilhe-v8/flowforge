apiVersion: v1
kind: Service
metadata:
  name: flowforge-worker
  namespace: flowforge
spec:
  selector:
    app: flowforge-worker
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-worker
  namespace: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-worker
  template:
    metadata:
      labels:
        app: flowforge-worker
    spec:
      containers:
        - name: worker
          image: flowforge/worker:latest
          command:
            - python
            - -m
            - flowforge.worker
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: flowforge-config
            - secretRef:
                name: flowforge-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
