# TLS certificate for flowforge.local can be provisioned via cert-manager
# (e.g. a Certificate resource targeting the flowforge-tls secret) or
# created manually with: kubectl create secret tls flowforge-tls --cert=... --key=...
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowforge-ingress
  namespace: flowforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "flowforge-backend"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - flowforge.local
      secretName: flowforge-tls
  rules:
    - host: flowforge.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: flowforge-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: flowforge-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flowforge-frontend
                port:
                  number: 80
